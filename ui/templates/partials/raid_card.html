<div class="flex flex-col md:flex-row">
    <div class="w-full md:w-48 h-40 md:h-auto bg-gradient-to-br from-slate-700 to-slate-900 flex items-center justify-center flex-shrink-0">
        <i class="fa-solid fa-shield-halved text-6xl text-slate-500"></i>
    </div>
    <div class="flex-1 p-5 flex flex-col justify-between">
        <div>
            <div class="flex items-center gap-2 mb-1">
                <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Current Raid</span>
                {% if is_running %}
                <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-amber-50 text-amber-700 border border-amber-200">
                    <i class="fa-solid fa-arrows-rotate text-xs mr-1 animate-spin"></i>
                    In progress
                </span>
                {% endif %}
            </div>
            <h3 class="text-2xl font-bold text-slate-900">{{ current_raid_name or 'Waiting...' }}</h3>
        </div>
        <div class="mt-3">
            <div class="flex items-center gap-2 mb-1">
                <i class="fa-solid fa-shield-halved text-sm text-slate-400"></i>
                <span class="text-xs font-semibold text-slate-500">Boss HP at enter</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div class="h-full bg-blue-600 rounded-full transition-all duration-300" style="width: {{ boss_hp }}%"></div>
                </div>
                <span class="text-sm font-bold text-slate-900 w-12 text-right">{{ boss_hp }}%</span>
            </div>
        </div>
    </div>
    <div class="w-full md:w-56 border-t md:border-t-0 md:border-l border-slate-200 bg-slate-50 p-5 flex flex-col items-center justify-center flex-shrink-0">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Raid Progress</span>
        <div class="relative w-28 h-28">
            <svg class="w-full h-full circular-progress" viewBox="0 0 36 36">
                <path class="text-slate-200" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3"></path>
                <path class="text-blue-600" stroke-dasharray="{{ turn_pct }}, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
                <span class="text-xl font-bold text-slate-900">{{ turn_pct }}%</span>
                <span class="text-xs text-slate-500">{{ current_turn }}/{{ turn_target }} Turn</span>
            </div>
        </div>
    </div>
</div>
