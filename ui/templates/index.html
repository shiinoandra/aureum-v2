<!DOCTYPE html>
<html>
<head>
    <title>Aureum Control Panel</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 640px; margin: 0 auto; background: #f5f5f5; }
        .card { background: white; border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .form-group { margin: 10px 0; }
        label { display: inline-block; width: 150px; font-size: 14px; }
        input[type="number"] { width: 80px; }
        button { padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        #startBtn { background: #4CAF50; color: white; }
        #startBtn:hover { background: #45a049; }
        #startBtn:disabled { background: #9e9e9e; cursor: not-allowed; }
        #stopBtn { background: #f44336; color: white; display: none; }
        #stopBtn:hover { background: #da190b; }
        #status { padding: 12px; background: #e3f2fd; margin: 10px 0; border-radius: 4px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .progress-container { width: 100%; background: #ddd; border-radius: 4px; margin: 10px 0; }
        .progress-bar { height: 22px; background: #4CAF50; width: 0%; border-radius: 4px; transition: width 0.3s; text-align: center; color: white; line-height: 22px; font-size: 12px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge.idle { background: #9e9e9e; color: white; }
        .badge.running { background: #4CAF50; color: white; }
        .stats { font-size: 14px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Aureum Control Panel</h1>
    <div class="card">
        <div id="status">
            Status: <span id="stateBadge" class="badge idle">Idle</span>
            <span id="stateText">-</span>
        </div>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar">0 / 0</div>
        </div>
        <div class="stats">
            Turn: <span id="turnDisplay">0 / 0</span>
        </div>
        <div style="margin-top: 15px;">
            <button id="startBtn" onclick="startTask()" disabled>Initializing...</button>
            <button id="stopBtn" onclick="stopTask()">Stop</button>
        </div>
    </div>
    <div class="card">
        <h3>Battle Parameters</h3>
        <div class="form-group">
            <label>Task:</label>
            <select id="taskType">
                <option value="raid">Raid</option>
                <option value="quest">Quest</option>
            </select>
        </div>
        <div class="form-group">
            <label>Turns:</label>
            <input type="number" id="turn" min="1" max="100">
        </div>
        <div class="form-group">
            <label>Refresh:</label>
            <input type="checkbox" id="refresh">
        </div>
        <div class="form-group">
            <label>Until Finish:</label>
            <input type="checkbox" id="until_finish">
        </div>
        <div class="form-group">
            <label>Trigger Skip:</label>
            <input type="checkbox" id="trigger_skip">
        </div>
        <div class="form-group">
            <label>Think Time (min):</label>
            <input type="number" id="think_time_min" step="0.1">
        </div>
        <div class="form-group">
            <label>Think Time (max):</label>
            <input type="number" id="think_time_max" step="0.1">
        </div>
        <button onclick="saveConfig()">Save Config</button>
    </div>
    <script>
        let evtSource = null;
        function connectSSE() {
            if (evtSource) evtSource.close();
            evtSource = new EventSource('/api/events');
            evtSource.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    updateUI(data);
                } catch (err) {
                    console.error('SSE parse error', err);
                }
            };
            evtSource.onerror = () => {
                console.log('SSE error, reconnecting...');
                setTimeout(connectSSE, 2000);
            };
        }
        function updateUI(data) {
            const isRunning = data.is_running;
            const badge = document.getElementById('stateBadge');
            const stateText = document.getElementById('stateText');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            if (isRunning) {
                badge.className = 'badge running';
                badge.textContent = 'Running';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
            } else {
                badge.className = 'badge idle';
                badge.textContent = 'Idle';
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            }
            stateText.textContent = data.current_state ? `(${data.current_state})` : '';
            const raidsCompleted = data.raids_completed || 0;
            const raidsTarget = data.raids_target || 0;
            const pct = raidsTarget > 0 ? Math.round((raidsCompleted / raidsTarget) * 100) : 0;
            const bar = document.getElementById('progressBar');
            bar.style.width = pct + '%';
            bar.textContent = raidsTarget > 0 ? `${raidsCompleted} / ${raidsTarget}` : `${raidsCompleted}`;
            document.getElementById('turnDisplay').textContent = `${data.current_turn || 0} / ${data.turn_target || 0}`;
        }
        function loadConfig() {
            fetch('/api/config')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('turn').value = data.turn;
                    document.getElementById('refresh').checked = data.refresh;
                    document.getElementById('until_finish').checked = data.until_finish;
                    document.getElementById('trigger_skip').checked = data.trigger_skip;
                    document.getElementById('think_time_min').value = data.think_time_min;
                    document.getElementById('think_time_max').value = data.think_time_max;
                    updateUI(data);
                });
        }
        function saveConfig() {
            fetch('/api/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    turn: parseInt(document.getElementById('turn').value),
                    refresh: document.getElementById('refresh').checked,
                    until_finish: document.getElementById('until_finish').checked,
                    trigger_skip: document.getElementById('trigger_skip').checked,
                    think_time_min: parseFloat(document.getElementById('think_time_min').value),
                    think_time_max: parseFloat(document.getElementById('think_time_max').value)
                })
            }).then(() => alert('Saved!'));
        }
        function startTask() {
            const taskType = document.getElementById('taskType').value;
            fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({task_type: taskType})
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'started') {
                    alert(data.message || 'Failed to start');
                }
            });
        }
        function stopTask() {
            fetch('/api/stop', {method: 'POST'})
                .then(r => r.json())
                .then(() => console.log('Stop requested'));
        }
        let wasReady = false;
        function checkReady() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    const startBtn = document.getElementById('startBtn');
                    if (!data.ready) {
                        startBtn.disabled = true;
                        startBtn.textContent = data.error ? 'Init Error' : 'Initializing...';
                        wasReady = false;
                    } else {
                        startBtn.disabled = false;
                        startBtn.textContent = 'Start';
                        if (!wasReady) {
                            loadConfig();   // <-- FIX: fetch real default.json values now
                            wasReady = true;
                        }
                    }
                });
        }
        connectSSE();
        setInterval(checkReady, 2000);
    </script>
</body>
</html>
