{% extends "base.html" %}

{% set active_tab = 'main' %}

{% block content %}
<!-- Status Header -->
<div id="status-header" hx-get="/htmx/status" hx-trigger="load, every 1s"></div>

<!-- Queue Panel -->
<div class="bg-white rounded-lg border border-slate-200 shadow-sm p-5">
    <h3 class="text-sm font-semibold text-slate-700 mb-3">Task Queue</h3>
    <div id="queue-panel" hx-get="/htmx/queue" hx-trigger="load, queueUpdated from:body"></div>
</div>

<!-- Task Selector with Tabs -->
<div class="bg-white rounded-lg border border-slate-200 shadow-sm p-5">
    <!-- Tabs -->
    <div class="flex items-center gap-1 mb-4 border-b border-slate-200">
        <button onclick="switchTaskTab('manual')" id="tab-manual" class="task-tab-btn px-4 py-2 text-sm font-medium text-blue-600 border-b-2 border-blue-600">
            Manual Select
        </button>
        <button onclick="switchTaskTab('content')" id="tab-content" class="task-tab-btn px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-700">
            Pick Content
        </button>
    </div>

    <!-- Manual Tab -->
    <div id="task-content-manual" class="task-content">
        <div class="flex flex-col md:flex-row gap-4 items-end">
            <div class="flex-1">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Select Task</label>
                <select id="taskSelector" name="task_name"
                        class="w-full h-12 px-3 rounded-lg border border-slate-300 text-sm font-semibold text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white"
                        hx-get="/htmx/task-preview"
                        hx-target="#taskPreview"
                        hx-swap="outerHTML"
                        hx-trigger="change">
                    <option value="">-- Select a task --</option>
                    {% for task_file in task_files %}
                    <option value="{{ task_file }}">{{ task_file }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="w-32">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Amount</label>
                <input type="number" id="taskAmount" name="amount" value="10" min="1"
                       class="w-full h-12 px-3 rounded-lg border border-slate-300 text-sm font-semibold text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <button hx-post="/api/enqueue"
                    hx-include="#taskSelector, #taskAmount"
                    hx-target="#enqueue-result"
                    hx-swap="innerHTML"
                    class="h-12 px-6 bg-slate-800 hover:bg-slate-900 text-white font-medium rounded-lg shadow-sm flex items-center gap-2 transition-colors">
                <i class="fa-solid fa-plus"></i>
                Add
            </button>
        </div>
        <div id="enqueue-result" class="mt-2 text-sm"></div>
        <div id="taskPreview" class="hidden"></div>
    </div>

    <!-- Pick Content Tab -->
    <div id="task-content-content" class="task-content hidden">
        <p class="text-sm text-slate-500 mb-4 text-center">Select content type to browse available tasks</p>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 max-w-2xl mx-auto">
            <!-- Raid Button -->
            <button onclick="openContentModal('raid')"
                    class="group flex flex-col items-center gap-3 p-6 bg-white rounded-xl border-2 border-slate-200 hover:border-blue-400 hover:shadow-lg transition-all">
                <div class="w-14 h-14 rounded-full bg-blue-50 group-hover:bg-blue-100 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-bolt text-2xl text-blue-600"></i>
                </div>
                <div class="text-center">
                    <span class="text-sm font-semibold text-slate-900 block">Raid</span>
                    <span class="text-xs text-slate-500">Browse raid grid</span>
                </div>
            </button>

            <!-- Event Button -->
            <button onclick="openContentModal('event')"
                    class="group flex flex-col items-center gap-3 p-6 bg-white rounded-xl border-2 border-slate-200 hover:border-amber-400 hover:shadow-lg transition-all">
                <div class="w-14 h-14 rounded-full bg-amber-50 group-hover:bg-amber-100 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-flag text-2xl text-amber-600"></i>
                </div>
                <div class="text-center">
                    <span class="text-sm font-semibold text-slate-900 block">Event</span>
                    <span class="text-xs text-slate-500">Browse event list</span>
                </div>
            </button>

            <!-- Quest Button -->
            <button onclick="openContentModal('quest')"
                    class="group flex flex-col items-center gap-3 p-6 bg-white rounded-xl border-2 border-slate-200 hover:border-emerald-400 hover:shadow-lg transition-all">
                <div class="w-14 h-14 rounded-full bg-emerald-50 group-hover:bg-emerald-100 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-scroll text-2xl text-emerald-600"></i>
                </div>
                <div class="text-center">
                    <span class="text-sm font-semibold text-slate-900 block">Quest</span>
                    <span class="text-xs text-slate-500">Browse quest list</span>
                </div>
            </button>
        </div>
        <div id="content-picker-result" class="mt-4"></div>
    </div>
</div>

<!-- Current Raid Card -->
<div id="raid-card" class="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden"
     hx-get="/htmx/raid-card" hx-trigger="load, every 2s"></div>

<!-- Content Picker Modal -->
<div id="contentModal" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true">
    <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm transition-opacity" onclick="closeContentModal()"></div>
    <div class="fixed inset-0 z-10 overflow-y-auto">
        <div class="flex min-h-full items-center justify-center p-4">
            <div class="relative transform overflow-hidden rounded-xl bg-white shadow-2xl transition-all w-full max-w-3xl">
                <!-- Modal Header -->
                <div class="bg-slate-800 px-6 py-4 flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-white" id="content-modal-title">Select Content</h3>
                    <button onclick="closeContentModal()" class="text-slate-400 hover:text-white transition-colors">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>

                <!-- Raid Category Tabs (shown only for raid content) -->
                <div id="raid-category-tabs" class="hidden flex gap-1 px-6 py-3 border-b border-slate-200 bg-slate-50">
                    <button id="dash-raid-tab-all" onclick="switchRaidCategory('all')" class="raid-tab-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-blue-600 text-white transition-colors">All</button>
                    <button id="dash-raid-tab-standard" onclick="switchRaidCategory('standard')" class="raid-tab-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 transition-colors">Standard</button>
                    <button id="dash-raid-tab-impossible" onclick="switchRaidCategory('impossible')" class="raid-tab-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 transition-colors">Impossible</button>
                    <button id="dash-raid-tab-unlimited" onclick="switchRaidCategory('unlimited')" class="raid-tab-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 transition-colors">Unlimited</button>
                    <button id="dash-raid-tab-v2" onclick="switchRaidCategory('v2')" class="raid-tab-btn px-3 py-1.5 text-xs font-medium rounded-lg bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 transition-colors">v2</button>
                </div>

                <!-- Search (shown only for raid content) -->
                <div id="raid-search-bar" class="hidden px-6 py-2 border-b border-slate-200 bg-slate-50">
                    <input type="text" id="dashRaidSearchInput" placeholder="Search raids by name or difficulty..."
                           class="w-full h-9 px-3 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"
                           oninput="filterRaidGrid(this.value, '#content-list-area')">
                </div>

                <!-- Content Area -->
                <div class="p-6 bg-slate-50 max-h-[65vh] overflow-y-auto">
                    <div id="content-list-area" hx-get="/htmx/content-list/raid" hx-trigger="load"></div>
                </div>

                <!-- Modal Footer -->
                <div class="bg-white px-6 py-4 border-t border-slate-200 flex justify-end gap-3">
                    <button onclick="closeContentModal()" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-colors">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// Task tab switching
function switchTaskTab(tab) {
    document.querySelectorAll('.task-tab-btn').forEach(btn => {
        btn.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
        btn.classList.add('text-slate-500');
    });
    document.querySelectorAll('.task-content').forEach(content => content.classList.add('hidden'));

    const activeBtn = document.getElementById('tab-' + tab);
    activeBtn.classList.remove('text-slate-500');
    activeBtn.classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
    document.getElementById('task-content-' + tab).classList.remove('hidden');
}

// Content Modal
let currentContentType = '';

function openContentModal(type) {
    currentContentType = type;
    const modal = document.getElementById('contentModal');
    const title = document.getElementById('content-modal-title');
    const raidTabs = document.getElementById('raid-category-tabs');
    const raidSearch = document.getElementById('raid-search-bar');

    const titles = {
        'raid': 'Select Raid',
        'event': 'Select Event',
        'quest': 'Select Quest'
    };
    title.textContent = titles[type] || 'Select Content';

    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';

    // Show/hide raid category tabs and search
    if (type === 'raid') {
        raidTabs.classList.remove('hidden');
        raidSearch.classList.remove('hidden');
    } else {
        raidTabs.classList.add('hidden');
        raidSearch.classList.add('hidden');
    }

    // Load appropriate content
    const listArea = document.getElementById('content-list-area');
    listArea.innerHTML = '<div class="flex justify-center py-8"><i class="fa-solid fa-circle-notch fa-spin text-2xl text-blue-600"></i></div>';

    if (type === 'raid') {
        htmx.ajax('GET', '/htmx/raid-grid/all', { target: '#content-list-area' });
        setActiveRaidTab('all');
    } else {
        htmx.ajax('GET', '/htmx/content-list/' + type, { target: '#content-list-area' });
    }
}

function setActiveRaidTab(category) {
    document.querySelectorAll('.raid-tab-btn').forEach(btn => {
        btn.classList.remove('bg-blue-600', 'text-white');
        btn.classList.add('bg-white', 'text-slate-600', 'border', 'border-slate-200');
    });
    const activeBtn = document.getElementById('dash-raid-tab-' + category);
    if (activeBtn) {
        activeBtn.classList.remove('bg-white', 'text-slate-600', 'border', 'border-slate-200');
        activeBtn.classList.add('bg-blue-600', 'text-white');
    }
}

function closeContentModal() {
    document.getElementById('contentModal').classList.add('hidden');
    document.body.style.overflow = '';
}

function selectContent(id, name, type, stageId, difficulty) {
    if (type !== 'raid') {
        alert('Only raid content is supported from the dashboard picker right now.');
        return;
    }
    closeContentModal();
    const result = document.getElementById('content-picker-result');
    result.innerHTML = `
        <div class="p-4 bg-blue-50 rounded-lg border border-blue-200">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs text-blue-600 font-semibold uppercase">Selected Raid</p>
                    <p class="text-lg font-bold text-slate-900">${name}</p>
                    <p class="text-xs text-slate-500">ID: ${id}</p>
                </div>
                <button onclick="addContentToQueue('${id}', '${name}', '${stageId}', '${difficulty}')" class="h-10 px-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg shadow-sm transition-colors">
                    Add to Queue
                </button>
            </div>
            <div id="raid-config-picker" class="mt-3 hidden"></div>
        </div>
    `;
}

function addContentToQueue(raidId, raidName, stageId, difficulty) {
    const picker = document.getElementById('raid-config-picker');
    const btn = document.querySelector('#content-picker-result button');
    if (btn) btn.disabled = true;

    fetch('/api/find_tasks_for_raid', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ raid_id: raidId })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status !== 'ok') {
            alert(data.message || 'Failed to look up tasks');
            if (btn) btn.disabled = false;
            return;
        }
        const matches = data.matches || [];
        if (matches.length === 0) {
            // No existing task — auto-create with defaults
            autoCreateAndEnqueue(raidId, raidName, stageId, difficulty);
        } else if (matches.length === 1) {
            // Exactly one match — enqueue directly
            enqueueTaskFile(matches[0].filename, 10);
        } else {
            // Multiple configs — let user pick
            picker.classList.remove('hidden');
            let html = '<label class="block text-xs font-semibold text-slate-500 mb-1">Choose config</label><select id="raidConfigSelect" class="w-full h-10 px-2 rounded border border-slate-300 text-sm">';
            matches.forEach(m => {
                html += `<option value="${m.filename}">${m.filename} (${m.summon_priority_count} summons)</option>`;
            });
            html += '</select><button onclick="enqueueSelectedConfig()" class="mt-2 h-9 px-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg">Add to Queue</button>';
            picker.innerHTML = html;
            picker.dataset.raidName = raidName;
            if (btn) btn.style.display = 'none';
        }
    });
}

function enqueueSelectedConfig() {
    const select = document.getElementById('raidConfigSelect');
    if (!select) return;
    enqueueTaskFile(select.value, 10);
}

function enqueueTaskFile(filename, amount) {
    fetch('/api/enqueue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task_name: filename, amount: amount })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok') {
            const result = document.getElementById('content-picker-result');
            result.innerHTML = '<span class="text-green-600 font-medium"><i class="fa-solid fa-check mr-1"></i>Added to queue</span>';
            const qp = document.getElementById('queue-panel');
            if (qp) htmx.trigger(qp, 'load');
        } else {
            alert(data.message || 'Enqueue failed');
        }
    });
}

function autoCreateAndEnqueue(raidId, raidName, stageId, difficulty) {
    const filename = raidId + '.json';
    fetch('/api/save_task', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            filename: filename,
            task_type: 'raid',
            raid_id: raidId,
            stage_id: stageId || null,
            difficulty: difficulty || null,
            amount: 10,
            turn: 1,
            refresh: true,
            until_finish: false,
            trigger_skip: false,
            pre_fa: false,
            min_hp_threshold: 60,
            max_hp_threshold: 100,
            min_people: 1,
            max_people: 30,
            summon_priority: [],
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok') {
            enqueueTaskFile(filename, 10);
        } else {
            alert(data.message || 'Failed to create task');
        }
    });
}

function loadContentPage(type, page) {
    const listArea = document.getElementById('content-list-area');
    listArea.innerHTML = '<div class="flex justify-center py-8"><i class="fa-solid fa-circle-notch fa-spin text-2xl text-blue-600"></i></div>';
    htmx.ajax('GET', '/htmx/content-list/' + type + '?page=' + page, { target: '#content-list-area' });
}

function switchRaidCategory(category) {
    setActiveRaidTab(category);
    const grid = document.getElementById('content-list-area');
    grid.innerHTML = '<div class="flex justify-center py-8"><i class="fa-solid fa-circle-notch fa-spin text-2xl text-blue-600"></i></div>';
    htmx.ajax('GET', '/htmx/raid-grid/' + category, { target: '#content-list-area' });
}

function filterRaidGrid(query, containerSelector) {
    const q = query.toLowerCase();
    const container = document.querySelector(containerSelector);
    if (!container) return;
    container.querySelectorAll('[data-name]').forEach(card => {
        const name = card.dataset.name || '';
        const diff = card.dataset.difficulty || '';
        if (name.includes(q) || diff.includes(q)) {
            card.classList.remove('hidden');
        } else {
            card.classList.add('hidden');
        }
    });
}

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeContentModal();
});
</script>
{% endblock %}
