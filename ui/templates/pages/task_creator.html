{% extends "base.html" %}

{% set active_tab = 'creator' %}

{% block content %}
<!-- Load Existing -->
<div class="bg-white rounded-lg border border-slate-200 shadow-sm p-5">
    <h3 class="text-sm font-semibold text-slate-700 mb-3">Load Existing Task</h3>
    <div class="flex gap-3">
        <select id="creatorTaskSelector" name="task_name"
                class="flex-1 h-12 px-3 rounded-lg border border-slate-300 text-sm font-semibold text-slate-900 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">-- Select a task to edit --</option>
            {% for task_file in task_files %}
            <option value="{{ task_file }}">{{ task_file }}</option>
            {% endfor %}
        </select>
        <button hx-get="/htmx/creator-load"
                hx-include="#creatorTaskSelector"
                hx-target="#creator-form"
                class="h-12 px-5 bg-slate-800 hover:bg-slate-900 text-white font-medium rounded-lg shadow-sm transition-colors">Load</button>
    </div>
</div>

<!-- Creator Form (loaded dynamically) -->
<div id="creator-form">
    <div class="bg-white rounded-lg border border-slate-200 shadow-sm p-5 md:p-6">
        <h3 class="text-sm font-semibold text-slate-700 mb-4">Battle Parameters</h3>
        <p class="text-sm text-slate-400">Select a task above to load its parameters for editing.</p>
    </div>
</div>

<!-- Event Generator -->
<div class="bg-white rounded-lg border border-slate-200 shadow-sm p-5">
    <h3 class="text-sm font-semibold text-slate-700 mb-4">Event Generator</h3>
    <div class="flex gap-3 mb-4">
        <input type="text" id="eventUrl" name="event_url" placeholder="https://game.granbluefantasy.jp/#event/..."
               class="flex-1 h-12 px-3 rounded-lg border border-slate-300 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button hx-post="/api/discover_event"
                hx-include="#eventUrl"
                hx-target="#discoveredBattles"
                class="h-12 px-5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow-sm transition-colors">Scan</button>
    </div>

    <div id="discoveredBattles" class="hidden mb-4">
        <!-- Populated by HTMX after scan -->
    </div>

    <div class="flex gap-3 items-end">
        <div class="flex-1">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Filename Prefix</label>
            <input type="text" id="eventPrefix" name="prefix" placeholder="e.g. gw"
                   class="w-full h-12 px-3 rounded-lg border border-slate-300 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button class="h-12 px-5 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg shadow-sm transition-colors">Generate Selected</button>
    </div>
</div>
{% endblock %}
